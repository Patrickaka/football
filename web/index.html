async function getLotteryContribution() {
  const contribDiv = document.getElementById('lottery-contribution-result');
  contribDiv.innerHTML = `<div class="status"><span class="spinner"></span>正在分析贡献度…</div>`;
  try {
    const data = await fetchJson('/api/lottery/contribution');
    if (data.error) {
      contribDiv.innerHTML = `<div class="status error">✗ ${esc(data.error)}</div>`;
      return;
    }
    const result = data.result || {};
    const weights = result.weights || {};
    
    let html = '';
    html += `<div class="row"><span class="k">频率特征</span><span class="v">权重: ${(weights.frequency || 0).toFixed(3)}</span></div>`;
    html += `<div class="row"><span class="k">遗漏特征</span><span class="v">权重: ${(weights.gap || 0).toFixed(3)}</span></div>`;
    html += `<div class="row"><span class="k">位置特征</span><span class="v">权重: ${(weights.position || 0).toFixed(3)}</span></div>`;
    html += `<div class="row"><span class="k">012路特征</span><span class="v">权重: ${(weights.road || 0).toFixed(3)}</span></div>`;
    
    // 特征重要性条形图
    html += `<div class="section-title" style="font-size:13px;margin:12px 0 8px">特征重要性</div>`;
    const maxWeight = Math.max(...Object.values(weights), 1);
    for (const [name, weight] of Object.entries(weights)) {
      const percent = (weight / maxWeight * 100).toFixed(0);
      const label = { frequency: '频率', gap: '遗漏', position: '位置', road: '012路' }[name] || name;
      html += `<div class="zhixuan">
        <span class="rank">${label}</span>
        <span class="num">${weight.toFixed(3)}</span>
        <span class="bar"><i style="width:${percent}%"></i></span>
        <span class="score">${percent}%</span>
      </div>`;
    }
    
    contribDiv.innerHTML = html;
  } catch (e) {
    contribDiv.innerHTML = `<div class="status error">分析贡献度失败：${esc(e.message)}</div>`;
  }
}

async function getLotteryEnsemble() {
  const ensembleDiv = document.getElementById('lottery-ensemble-result');
  ensembleDiv.style.display = 'block';
  ensembleDiv.innerHTML = `<div class="status"><span class="spinner"></span>正在进行多模型集成投票…</div>`;
  try {
    const data = await fetchJson('/api/lottery/ensemble?method=voting');
    if (data.error) {
      ensembleDiv.innerHTML = `<div class="status error">✗ ${esc(data.error)}</div>`;
      return;
    }
    const result = data.result || {};
    const front = (result.front || []).map(n => String(n).padStart(2, '0')).join(' ');
    const back = (result.back || []).map(n => String(n).padStart(2, '0')).join(' ');
    
    let html = '';
    
    // 预测号码
    html += `<div class="highlight">
      <div style="display:flex;justify-content:center;align-items:center;gap:12px">
        <span class="big" style="letter-spacing:4px;color:#f85149">${front}</span>
        <span style="color:var(--muted);font-size:24px">+</span>
        <span class="big" style="letter-spacing:4px;color:#4493f8">${back}</span>
      </div>
      <div class="sub">投票策略：${result.method || 'voting'}</div>
    </div>`;
    
    // 候选号码
    if (result.front_candidates?.length || result.back_candidates?.length) {
      html += `<div class="section-title" style="font-size:13px;margin:12px 0 8px">候选号码</div>`;
      html += `<div class="card">`;
      if (result.front_candidates?.length) {
        html += `<div class="row"><span class="k">前区候选</span><span class="v">${result.front_candidates.slice(0, 8).map(x => String(x.number).padStart(2, '0') + '(' + x.score.toFixed(2) + ')').join(' · ')}</span></div>`;
      }
      if (result.back_candidates?.length) {
        html += `<div class="row"><span class="k">后区候选</span><span class="v">${result.back_candidates.slice(0, 6).map(x => String(x.number).padStart(2, '0') + '(' + x.score.toFixed(2) + ')').join(' · ')}</span></div>`;
      }
      html += `</div>`;
    }
    
    // 周期状态
    if (result.cycle_info) {
      const ci = result.cycle_info;
      html += `<div class="section-title" style="font-size:13px;margin:12px 0 8px">周期状态</div>`;
      html += `<div class="blend-row">`;
      if (ci.hot_front?.length) html += `<span>🔥前区热门: ${ci.hot_front.map(x => String(x).padStart(2, '0')).join(' ')}</span>`;
      if (ci.hot_back?.length) html += `<span>🔥后区热门: ${ci.hot_back.map(x => String(x).padStart(2, '0')).join(' ')}</span>`;
      html += `</div>`;
    }
    
    ensembleDiv.innerHTML = html;
  } catch (e) {
    ensembleDiv.innerHTML = `<div class="status error">集成投票失败：${esc(e.message)}</div>`;
  }
}

async function fetchLotteryData() {
  const appLottery = document.getElementById('app-lottery');
  const originalContent = appLottery.innerHTML;
  
  appLottery.innerHTML = `<div class="status"><span class="spinner"></span>正在抓取最新开奖号码并重新分析…</div>`;
  
  try {
    const data = await fetchJson('/api/lottery/fetch');
    if (data.error) {
      appLottery.innerHTML = `<div class="status error">✗ ${esc(data.error)}</div>`;
      return;
    }
    
    const result = data.result || {};
    const success = result.success || false;
    const message = result.message || '';
    const latestIssue = result.latest_issue || '';
    
    // 如果服务器返回了重新分析的数据，直接渲染分析结果
    if (result.analysis) {
      lotteryLoaded = true;
      renderLottery(result.analysis);
      
      // 显示抓取结果提示
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: ${success ? '#2ea043' : '#f85149'};
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 14px;
        z-index: 1000;
        animation: fadeInUp 0.3s ease;
      `;
      toast.innerHTML = `${success ? '✅' : '❌'} ${message}${latestIssue ? ' · 最新期号: ' + latestIssue : ''}`;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'fadeOutDown 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
      return;
    }
    
    // 备用：重新加载页面
    lotteryLoaded = false;
    await loadLottery();
    
    // 显示抓取结果提示
    const toast = document.createElement('div');
    toast.style.cssText = `
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: ${success ? '#2ea043' : '#f85149'};
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1000;
      animation: fadeInUp 0.3s ease;
    `;
    toast.innerHTML = `${success ? '✅' : '❌'} ${message}${latestIssue ? ' · 最新期号: ' + latestIssue : ''}`;
    document.body.appendChild(toast);
    
    setTimeout(() => {
      toast.style.animation = 'fadeOutDown 0.3s ease';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  } catch (e) {
    appLottery.innerHTML = `<div class="status error">抓取失败：${esc(e.message)}</div>`;
    setTimeout(() => {
      appLottery.innerHTML = originalContent;
    }, 2000);
  }
}

function initPage() {
  const hash = location.hash.replace('#', '');
  switchTab(hash === '3d' ? 'lottery3d' : hash === 'pailie5' ? 'pailie5' : hash === 'lottery' ? 'lottery' : hash === 'predictions' ? 'predictions' : 'football');
}

async function loadPredictions() {
  const app = document.getElementById('app-predictions');
  app.innerHTML = `<div class="status"><span class="spinner"></span>正在加载预测记录…</div>`;
  
  try {
    const [syncStatus, recordsData] = await Promise.all([
      fetchJson('/api/sync/status'),
      fetchJson('/api/predictions')
    ]);
    
    const sync = syncStatus.result || {};
    const records = recordsData.result?.records || [];
    
    let html = '';
    
    // ── 自动同步状态卡片 ──
    html += `<div class="card model-health"><h3>🔄 自动赛果同步</h3>
      <div class="status-item">
        <span class="status-dot">✅</span>
        <div>
          <div class="status-name">已回填</div>
          <div class="status-desc">${sync.settled || 0} 场</div>
        </div>
      </div>
      <div class="status-item">
        <span class="status-dot">⏳</span>
        <div>
          <div class="status-name">待同步</div>
          <div class="status-desc">${sync.pending_sync || 0} 场</div>
        </div>
      </div>
      <div class="status-item ${sync.failed > 0 ? '' : ''}">
        <span class="status-dot">${sync.failed > 0 ? '⚠️' : '✅'}</span>
        <div>
          <div class="status-name">同步失败</div>
          <div class="status-desc">${sync.failed || 0} 场</div>
        </div>
      </div>
      ${sync.last_sync_at ? `<div class="status-item">
        <span class="status-dot">🕐</span>
        <div>
          <div class="status-name">最近同步</div>
          <div class="status-desc">${sync.last_sync_at?.replace('T', ' ').slice(0, 19) || '-'}</div>
        </div>
      </div>` : ''}
    </div>`;
    
    // ── 操作按钮 ──
    html += `<div style="display:flex;gap:10px;margin-bottom:16px">
      <button type="button" onclick="triggerSync()" style="flex:1;padding:10px;background:var(--card2);color:var(--text);border:1px solid var(--line);border-radius:8px;font-size:14px;cursor:pointer">
        🔁 立即同步一次
      </button>
      ${sync.failed > 0 ? `<button type="button" onclick="hideFailedRecords()" style="flex:1;padding:10px;background:var(--card2);color:var(--muted);border:1px solid var(--line);border-radius:8px;font-size:14px;cursor:pointer">
        🧹 隐藏失败记录
      </button>` : ''}
    </div>`;
    
    // ── 预测记录列表 ──
    html += `<div class="section-title">📋 预测记录（共 ${records.length} 条）</div>`;
    
    if (records.length === 0) {
      html += `<div class="card">
        <div class="status" style="padding:20px">暂无预测记录。点击足球预测标签页查看比赛并进行预测。</div>
      </div>`;
    } else {
      records.forEach((record, idx) => {
        const statusMap = {
          'pending': { label: '等待自动同步', color: 'var(--muted)' },
          'ready': { label: '准备同步', color: 'var(--warn)' },
          'synced': { label: '已回填', color: 'var(--accent2)' },
          'retry': { label: '重试中', color: 'var(--warn)' },
          'failed': { label: '同步失败', color: 'var(--away)' },
          'ignored': { label: '已隐藏', color: 'var(--muted)' },
        };
        const status = statusMap[record.sync_status] || statusMap['pending'];
        
        // 获取预测比分Top1
        const predictedScores = record.predicted_scores || {};
        const topScore = Object.entries(predictedScores).sort((a, b) => b[1] - a[1])[0];
        const topScoreStr = topScore ? `${topScore[0]} (${(topScore[1] * 100).toFixed(1)}%)` : '-';
        
        html += `<div class="card" style="${idx > 0 ? 'margin-top:8px' : ''}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:600;font-size:15px">${esc(record.home)} vs ${esc(record.away)}</div>
              <div style="color:var(--muted);font-size:12px;margin-top:2px">${esc(record.league || '')} · ${esc(record.match_time || '')}</div>
            </div>
            <div style="text-align:right">
              <div style="color:${status.color};font-size:13px;font-weight:500">${status.label}</div>
              ${record.sync_attempts > 0 ? `<div style="color:var(--muted);font-size:11px">失败${record.sync_attempts}次</div>` : ''}
            </div>
          </div>`;
        
        if (record.settled) {
          // 已结算
          const hitTop1 = record.hit_top1 ? '✅' : '❌';
          const hitTop3 = record.hit_top3 ? '✅' : '❌';
          html += `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:flex;gap:16px;font-size:13px">
            <div><span style="color:var(--muted)">预测：</span>${topScoreStr}</div>
            <div><span style="color:var(--muted)">实际：</span><b style="color:var(--accent2)">${esc(record.actual_score || '-')}</b></div>
            <div><span style="color:var(--muted)">Top1：</span>${hitTop1}</div>
            <div><span style="color:var(--muted)">Top3：</span>${hitTop3}</div>
          </div>`;
        } else if (record.sync_status === 'failed') {
          // 同步失败
          html += `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:12px">
            <div style="color:var(--away)">失败原因：${esc(record.last_sync_error || '未知')}</div>
            ${record.next_sync_at ? `<div style="color:var(--muted);margin-top:2px">下次重试：${record.next_sync_at?.replace('T', ' ').slice(0, 16) || '-'}</div>` : ''}
          </div>`;
        } else {
          // 待同步
          html += `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:12px">
            <div><span style="color:var(--muted)">预测Top1：</span>${topScoreStr}</div>
            ${record.next_sync_at ? `<div style="color:var(--muted);margin-top:2px">预计同步：${record.next_sync_at?.replace('T', ' ').slice(0, 16) || '-'}</div>` : ''}
          </div>`;
        }
        
        html += `</div>`;
      });
    }
    
    app.innerHTML = html;
  } catch (e) {
    app.innerHTML = `<div class="status error">加载失败：${esc(e.message)}</div>`;
  }
}

async function triggerSync() {
  const btn = event.target;
  const originalText = btn.textContent;
  btn.textContent = '同步中...';
  btn.disabled = true;
  
  try {
    const data = await fetchJson('/api/sync/trigger');
    if (data.result) {
      alert(`同步完成：${data.result.message || '同步成功'}`);
      loadPredictions();
    } else {
      alert('同步失败：' + (data.error || '未知错误'));
    }
  } catch (e) {
    alert('同步失败：' + e.message);
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

async function hideFailedRecords() {
  if (!confirm('确定要隐藏所有失败记录吗？')) return;
  
  try {
    const data = await fetchJson('/api/sync/hide_failed');
    if (data.result?.success) {
      alert('已隐藏所有失败记录');
      loadPredictions();
    } else {
      alert('操作失败：' + (data.error || '未知错误'));
    }
  } catch (e) {
    alert('操作失败：' + e.message);
  }
}

initPage();
